version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: nest.Dockerfile
    container_name: wa-bot-logic
    volumes:
      - .:/app
      - /app/node_modules        # Protect internal modules
      - ./auth_info_baileys:/app/auth_info_baileys
    ports:
      - "3000:3000"
    restart: always
    environment:
      - PORT=3000
    command: sh -c "npm run start:dev"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../dashboard.Dockerfile
    container_name: wa-bot-dashboard
    volumes:
      - ./dashboard:/app
      - /app/node_modules        # Protect internal modules
    ports:
      - "5173:5173"
    depends_on:
      - bot
    restart: always
    command: sh -c "npm run dev -- --host"
